<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebDesk ⚡ - مشاركة الشاشة الذكية (AnyDesk Web)</title>
    
    <!-- خطوط وأيقونات الموقع -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    
    <!-- مكتبات الاتصال والـ QR Code -->
    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <style>
        :root {
            --bg-color: #0b0f19;
            --card-bg: rgba(23, 32, 54, 0.9);
            --accent-color: #00f2fe;
            --purple-accent: #4facfe;
            --text-color: #f1f5f9;
            --danger-color: #ff4b4b;
            --success-color: #10b981;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Tajawal', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-bottom: 40px;
            background-image: 
                radial-gradient(circle at 15% 15%, rgba(0, 242, 254, 0.08) 0%, transparent 40%),
                radial-gradient(circle at 85% 85%, rgba(79, 172, 254, 0.08) 0%, transparent 40%);
        }

        header {
            width: 100%;
            padding: 15px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            background: rgba(11, 15, 25, 0.8);
        }

        .logo {
            font-size: 1.4rem;
            font-weight: 900;
            background: linear-gradient(135deg, var(--accent-color), var(--purple-accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(255, 255, 255, 0.05);
            padding: 6px 14px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            font-size: 0.9rem;
        }

        /* نافذة تسجيل الاسم السريعة */
        .auth-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(11, 15, 25, 0.95);
            backdrop-filter: blur(15px);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .auth-card {
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 24px;
            padding: 30px 25px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
            text-align: right;
        }

        .input-group label {
            font-size: 0.85rem;
            color: #94a3b8;
        }

        input {
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            background: rgba(0, 0, 0, 0.3);
            color: #fff;
            outline: none;
            font-size: 0.95rem;
            text-align: center;
        }

        input:focus {
            border-color: var(--accent-color);
        }

        .btn {
            padding: 12px;
            border-radius: 12px;
            border: none;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            transition: 0.3s;
            font-size: 0.95rem;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent-color), var(--purple-accent));
            color: #000;
        }

        .btn-danger {
            background: var(--danger-color);
            color: #fff;
        }

        .btn-success {
            background: var(--success-color);
            color: #fff;
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        .main-container {
            width: 90%;
            max-width: 1100px;
            margin: 25px auto;
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 25px;
            backdrop-filter: blur(16px);
            display: flex;
            flex-direction: column;
            gap: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        #qrcode-box {
            display: flex;
            justify-content: center;
            padding: 10px;
            background: #fff;
            border-radius: 12px;
            width: fit-content;
            margin: 10px auto;
        }

        /* شاشة العرض والتحكم أسفل الموقع */
        .stream-container {
            width: 100%;
            background: #000;
            border-radius: 20px;
            overflow: hidden;
            display: none;
            position: relative;
            border: 2px solid var(--accent-color);
            box-shadow: 0 15px 40px rgba(0, 242, 254, 0.2);
            margin-top: 10px;
        }

        .stream-container.active {
            display: block;
        }

        video {
            width: 100%;
            height: auto;
            max-height: 75vh;
            display: block;
            margin: 0 auto;
        }
        
        video.mode-contain { object-fit: contain; }
        video.mode-cover { object-fit: cover; }

        .stream-controls {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 10px;
            background: rgba(11, 15, 25, 0.9);
            padding: 12px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body>

    <!-- نافذة دخول سريعة -->
    <div class="auth-overlay" id="authModal">
        <div class="auth-card">
            <h2>WebDesk ⚡</h2>
            <p style="color: #94a3b8; font-size: 0.85rem;">أدخل اسم جهازك للبدء</p>
            
            <div class="input-group">
                <label>اسم جهازك:</label>
                <input type="text" id="userNameInput" placeholder="مثال: لابتوب أحمد / موبايل">
            </div>

            <button class="btn btn-primary" onclick="localLogin()">دخول فوري</button>
        </div>
    </div>

    <!-- الشريط العلوي -->
    <header>
        <div class="logo">
            <i class="fa-solid fa-desktop"></i> WebDesk Remote
        </div>
        <div class="user-profile" id="userBadge" style="display: none;">
            <span id="userNameDisplay">جهازي</span>
            <i class="fa-solid fa-right-from-bracket" style="cursor: pointer; color: var(--danger-color);" onclick="logout()" title="خروج"></i>
        </div>
    </header>

    <!-- الواجهة الرئيسية -->
    <div class="main-container">
        <div class="cards-grid">
            
            <!-- 💻 الخانة الأولى: اللابتوب (جهاز البث) -->
            <div class="card">
                <h3><i class="fa-solid fa-tower-broadcast" style="color: var(--accent-color);"></i> 💻 خانة اللابتوب (لبث الشاشة)</h3>
                <p style="color: #94a3b8; font-size: 0.82rem;">استخدم هذه الخانة لبث شاشة اللابتوب وعرضها على الموبايل.</p>
                
                <div class="input-group">
                    <label>كلمة سر الحماية:</label>
                    <input type="password" id="hostPassword" value="123456">
                </div>

                <div id="hostInfo" style="display: none;">
                    <div class="input-group">
                        <label>رمز اللابتوب (Device ID):</label>
                        <input type="text" id="myIdInput" readonly style="font-weight: bold; color: var(--accent-color);">
                    </div>
                    <div id="qrcode-box"></div>
                </div>

                <button class="btn btn-primary" id="startShareBtn" onclick="startScreenShare()">
                    <i class="fa-solid fa-play"></i> بدء بث شاشة اللابتوب
                </button>

                <button class="btn btn-danger" id="stopShareBtn" onclick="stopConnection()" style="display: none;">
                    <i class="fa-solid fa-circle-stop"></i> إيقاف البث الآن
                </button>

                <button class="btn btn-secondary" id="copyLinkBtn" onclick="copyShareLink()" style="display: none;">
                    <i class="fa-solid fa-copy"></i> نسخ رابط الاتصال للموبايل
                </button>
            </div>

            <!-- 📱 الخانة الثانية: الموبايل (جهاز الاستقبال والاتصال) -->
            <div class="card">
                <h3><i class="fa-solid fa-mobile-screen-button" style="color: var(--accent-color);"></i> 📱 خانة الموبايل (للاتصال والعرض)</h3>
                <p style="color: #94a3b8; font-size: 0.82rem;">أدخل رمز اللابتوب وكلمة السر لمشاهدة الشاشة على الموبايل.</p>

                <div class="input-group">
                    <label>رمز اللابتوب (Remote ID):</label>
                    <input type="text" id="remoteIdInput" placeholder="مثال: desk-xyz123">
                </div>
                <div class="input-group">
                    <label>كلمة سر اللابتوب:</label>
                    <input type="password" id="remotePassInput" placeholder="أدخل كلمة السر">
                </div>

                <button class="btn btn-success" onclick="connectToRemote()">
                    <i class="fa-solid fa-link"></i> اتصال وعرض الشاشة
                </button>
            </div>

        </div>

        <!-- 🖥️ شاشة عرض البث المباشر والتحكم بالأسفل -->
        <div class="stream-container" id="streamContainer">
            <video id="remoteVideo" autoplay playsinline class="mode-contain"></video>
            
            <div class="stream-controls">
                <button class="btn btn-secondary" style="width: auto; padding: 8px 14px;" onclick="changeVideoFit('contain')">
                    <i class="fa-solid fa-compress"></i> ملاءمة الشاشة
                </button>
                <button class="btn btn-secondary" style="width: auto; padding: 8px 14px;" onclick="changeVideoFit('cover')">
                    <i class="fa-solid fa-expand"></i> ملء الشاشة
                </button>
                <button class="btn btn-primary" style="width: auto; padding: 8px 14px;" onclick="toggleFullscreen()">
                    <i class="fa-solid fa-up-right-and-down-left-from-center"></i> تكبير كامل
                </button>
                <button class="btn btn-danger" style="width: auto; padding: 8px 14px;" onclick="stopConnection()">
                    <i class="fa-solid fa-power-off"></i> إنهاء الاتصال
                </button>
            </div>
        </div>
    </div>

    <script>
        let peer = null;
        let currentCall = null;
        let localStream = null;

        window.onload = () => {
            const urlParams = new URLSearchParams(window.location.search);
            const connectId = urlParams.get('connect');
            if (connectId) {
                document.getElementById('remoteIdInput').value = connectId;
            }

            const savedUser = localStorage.getItem('webdesk_user');
            if (savedUser) {
                showApp(savedUser);
            }
        };

        function localLogin() {
            const name = document.getElementById('userNameInput').value.trim();
            if (!name) {
                alert('الرجاء إدخال اسم جهازك أولاً!');
                return;
            }
            localStorage.setItem('webdesk_user', name);
            showApp(name);
        }

        function showApp(name) {
            document.getElementById('authModal').style.display = 'none';
            document.getElementById('userBadge').style.display = 'flex';
            document.getElementById('userNameDisplay').innerText = name;
            
            const cleanId = name.replace(/[^a-zA-Z0-9]/g, '').substring(0, 5) + Math.floor(Math.random() * 899 + 100);
            initPeer('desk-' + cleanId.toLowerCase());
        }

        function logout() {
            localStorage.removeItem('webdesk_user');
            location.reload();
        }

        function initPeer(peerId) {
            // إضافة سيرفرات STUN لضمان الربط عبر الشبكات المختلفة
            peer = new Peer(peerId, {
                config: {
                    'iceServers': [
                        { urls: 'stun:stun.l.google.com:19302' },
                        { urls: 'stun:stun1.l.google.com:19302' }
                    ]
                }
            });

            peer.on('open', (id) => {
                document.getElementById('myIdInput').value = id;
                document.getElementById('hostInfo').style.display = 'block';
            });

            peer.on('call', (call) => {
                const incomingPass = call.metadata ? call.metadata.password : null;
                const myPass = document.getElementById('hostPassword').value;

                if (incomingPass === myPass) {
                    if (localStream) {
                        call.answer(localStream);
                        currentCall = call;
                    }
                } else {
                    alert('⚠️ رفض الاتصال: كلمة السر غير صحيحة!');
                    call.close();
                }
            });
        }

        // بدء البث من اللابتوب
        async function startScreenShare() {
            try {
                localStream = await navigator.mediaDevices.getDisplayMedia({ 
                    video: { cursor: "always" }, 
                    audio: false 
                });
                
                const videoElem = document.getElementById('remoteVideo');
                videoElem.srcObject = localStream;
                videoElem.muted = true;
                document.getElementById('streamContainer').classList.add('active');

                document.getElementById('startShareBtn').style.display = 'none';
                document.getElementById('stopShareBtn').style.display = 'flex';
                document.getElementById('copyLinkBtn').style.display = 'flex';

                // توليد الـ QR Code للاتصال المباشر
                const shareUrl = window.location.href.split('?')[0] + '?connect=' + peer.id;
                document.getElementById('qrcode-box').innerHTML = '';
                new QRCode(document.getElementById('qrcode-box'), { text: shareUrl, width: 120, height: 120 });

                localStream.getVideoTracks()[0].onended = () => stopConnection();

            } catch (err) {
                alert('تنبيه: يجب السماح بتمكين مشاركة الشاشة لبدء البث.');
            }
        }

        // نسخ رابط الاتصال المباشر
        function copyShareLink() {
            const shareUrl = window.location.href.split('?')[0] + '?connect=' + peer.id;
            navigator.clipboard.writeText(shareUrl).then(() => {
                alert('تم نسخ رابط الاتصال! يمكنك إرساله للموبايل ليفتح الصفحة ويكتب الكود تلقائياً.');
            });
        }

        // الاتصال من الموبايل باللابتوب
        function connectToRemote() {
            const remoteId = document.getElementById('remoteIdInput').value.trim();
            const remotePass = document.getElementById('remotePassInput').value.trim();

            if (!remoteId || !remotePass) {
                alert('يرجى إدخال رمز اللابتوب وكلمة السر!');
                return;
            }

            const call = peer.call(remoteId, null, {
                metadata: { password: remotePass }
            });
            currentCall = call;

            call.on('stream', (remoteStream) => {
                const videoElem = document.getElementById('remoteVideo');
                videoElem.srcObject = remoteStream;
                document.getElementById('streamContainer').classList.add('active');
                
                videoElem.play().catch(e => console.log("Autoplay:", e));
                document.getElementById('streamContainer').scrollIntoView({ behavior: 'smooth' });
            });

            call.on('close', () => {
                alert('تم إنهاء البث.');
                stopConnection();
            });
        }

        // إيقاف البث والاتصال
        function stopConnection() {
            if (localStream) {
                localStream.getTracks().forEach(track => track.stop());
                localStream = null;
            }
            if (currentCall) {
                currentCall.close();
                currentCall = null;
            }

            document.getElementById('streamContainer').classList.remove('active');
            document.getElementById('remoteVideo').srcObject = null;
            document.getElementById('startShareBtn').style.display = 'flex';
            document.getElementById('stopShareBtn').style.display = 'none';
            document.getElementById('copyLinkBtn').style.display = 'none';
        }

        // التحكم في أبعاد الفيديو
        function changeVideoFit(mode) {
            const video = document.getElementById('remoteVideo');
            video.className = '';
            video.classList.add(`mode-${mode}`);
        }

        function toggleFullscreen() {
            const container = document.getElementById('streamContainer');
            if (!document.fullscreenElement) {
                container.requestFullscreen().catch(err => alert(err.message));
            } else {
                document.exitFullscreen();
            }
        }
    </script>
</body>
</html>
