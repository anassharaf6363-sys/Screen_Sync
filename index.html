<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AnyWeb ⚡ - شير الشاشة مع تسجيل جوجل الحقيقي</title>
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <!-- PeerJS CDN -->
    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <!-- QRCode.js CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <!-- Firebase SDK (Google Auth Official Library) -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>

    <style>
        :root {
            --bg-color: #0b0f19;
            --card-bg: rgba(23, 32, 54, 0.75);
            --accent-color: #00f2fe;
            --purple-accent: #4facfe;
            --text-color: #f1f5f9;
            --danger-color: #ff4b4b;
            --success-color: #10b981;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Tajawal', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-image: 
                radial-gradient(circle at 15% 15%, rgba(0, 242, 254, 0.08) 0%, transparent 40%),
                radial-gradient(circle at 85% 85%, rgba(79, 172, 254, 0.08) 0%, transparent 40%);
        }

        /* Header */
        header {
            width: 100%;
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
        }

        .logo {
            font-size: 1.6rem;
            font-weight: 900;
            background: linear-gradient(135deg, var(--accent-color), var(--purple-accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(255, 255, 255, 0.05);
            padding: 6px 16px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .avatar-img {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            object-fit: cover;
        }

        /* Auth Modal */
        .auth-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(11, 15, 25, 0.95);
            backdrop-filter: blur(15px);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .auth-card {
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 24px;
            padding: 35px;
            width: 90%;
            max-width: 420px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .btn-google {
            background: #ffffff;
            color: #333;
            font-weight: bold;
            border: none;
            padding: 12px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            cursor: pointer;
            transition: 0.3s;
            font-size: 0.95rem;
        }

        .btn-google:hover { background: #e2e8f0; }

        .divider {
            display: flex;
            align-items: center;
            color: #64748b;
            font-size: 0.8rem;
            margin: 5px 0;
        }
        .divider::before, .divider::after {
            content: "";
            flex: 1;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        .divider span { padding: 0 10px; }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
            text-align: right;
        }

        .input-group label {
            font-size: 0.85rem;
            color: #94a3b8;
        }

        input {
            width: 100%;
            padding: 12px 16px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            background: rgba(0, 0, 0, 0.3);
            color: #fff;
            font-size: 0.95rem;
            outline: none;
        }

        input:focus { border-color: var(--accent-color); }

        .auth-buttons-row {
            display: flex;
            gap: 10px;
        }

        .btn {
            padding: 12px 20px;
            border-radius: 12px;
            border: none;
            font-size: 0.95rem;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: 0.3s all ease;
            flex: 1;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent-color), var(--purple-accent));
            color: #000;
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        /* Main App Area */
        .main-container {
            width: 90%;
            max-width: 1100px;
            margin: 40px auto;
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 25px;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 30px;
            backdrop-filter: blur(16px);
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        #qrcode-box {
            display: flex;
            justify-content: center;
            padding: 12px;
            background: #fff;
            border-radius: 12px;
            width: fit-content;
            margin: 10px auto;
        }

        .stream-container {
            width: 100%;
            background: #000;
            border-radius: 20px;
            overflow: hidden;
            display: none;
            position: relative;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .stream-container.active { display: block; }
        video { width: 100%; height: auto; max-height: 75vh; display: block; }
        
        .stream-controls {
            position: absolute;
            bottom: 20px;
            right: 20px;
            display: flex;
            gap: 10px;
            background: rgba(0,0,0,0.7);
            padding: 10px;
            border-radius: 12px;
            backdrop-filter: blur(10px);
        }
    </style>
</head>
<body>

    <!-- Modal تسجيل الدخول بـ جوجل أو بالبريد -->
    <div class="auth-overlay" id="authModal">
        <div class="auth-card">
            <h2>تسجيل الدخول إلى AnyWeb</h2>
            <p style="color: #94a3b8; font-size: 0.85rem;">اربط حسابك لتتمكن من مشاركة شاشتك بأمان</p>
            
            <!-- زر دخول جوجل الحقيقي -->
            <button class="btn-google" onclick="loginWithGoogle()">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="18" alt="Google">
                تسجيل الدخول باستخدام حساب جوجل
            </button>

            <div class="divider"><span>أو ببريد Gmail وكلمة السر</span></div>

            <div class="input-group">
                <input type="email" id="loginEmail" placeholder="بريد Gmail الخاص بك">
            </div>
            <div class="input-group">
                <input type="password" id="loginPass" placeholder="كلمة السر">
            </div>

            <div class="auth-buttons-row">
                <button class="btn btn-primary" onclick="handleEmailLogin()">دخول</button>
                <button class="btn btn-secondary" onclick="handleEmailSignUp()">إنشاء حساب</button>
            </div>
        </div>
    </div>

    <!-- الهيدر -->
    <header>
        <div class="logo">
            <i class="fa-solid fa-bolt"></i> AnyWeb Secure
        </div>
        <div class="user-profile" id="userBadge" style="display: none;">
            <img id="userAvatar" class="avatar-img" src="" alt="Profile">
            <span id="userNameDisplay">المستخدم</span>
            <i class="fa-solid fa-right-from-bracket" style="cursor: pointer; margin-right: 8px; color: var(--danger-color);" onclick="logout()" title="تسجيل الخروج"></i>
        </div>
    </header>

    <!-- الواجهة الرئيسية -->
    <div class="main-container">
        <div class="cards-grid">
            
            <!-- كارت بث الشاشة -->
            <div class="card">
                <h3><i class="fa-solid fa-tower-broadcast" style="color: var(--accent-color);"></i> بث شاشة هذا الجهاز (Host)</h3>
                <p style="color: #94a3b8; font-size: 0.85rem;">حدد كلمة سر خاصة بهذا الجهاز لمنع أي شخص غير مرخص من الدخول.</p>
                
                <div class="input-group">
                    <label>كلمة سر حماية الاتصال للجهاز:</label>
                    <input type="password" id="hostPassword" value="123456">
                </div>

                <div id="hostInfo" style="display: none;">
                    <div class="input-group">
                        <label>رمز الجهاز الخاص بك (Device ID):</label>
                        <input type="text" id="myIdInput" readonly style="text-align: center; font-weight: bold; letter-spacing: 1px;">
                    </div>
                    <div id="qrcode-box"></div>
                </div>

                <button class="btn btn-primary" id="startShareBtn" onclick="startScreenShare()">
                    <i class="fa-solid fa-play"></i> بدء بث الشاشة الآن
                </button>
            </div>

            <!-- كارت الاتصال بجهاز آخر -->
            <div class="card">
                <h3><i class="fa-solid fa-plug" style="color: var(--accent-color);"></i> الاتصال بجهاز آخر (Viewer)</h3>
                <p style="color: #94a3b8; font-size: 0.85rem;">أدخل رمز الجهاز وكلمة السر المحددة عليه لمتابعة الشاشة مباشر.</p>

                <div class="input-group">
                    <label>رمز الجهاز المطلوب (Device ID):</label>
                    <input type="text" id="remoteIdInput" placeholder="مثال: desk-123456">
                </div>
                <div class="input-group">
                    <label>كلمة سر الجهاز:</label>
                    <input type="password" id="remotePassInput" placeholder="أدخل كلمة سر الجهاز الآخر">
                </div>

                <button class="btn btn-primary" onclick="connectToRemote()">
                    <i class="fa-solid fa-link"></i> اتصال آمن ومباشر
                </button>
            </div>

        </div>

        <!-- مشغل الفيديو للبث المباشر -->
        <div class="stream-container" id="streamContainer">
            <video id="remoteVideo" autoplay playsinline></video>
            <div class="stream-controls">
                <button class="btn btn-secondary" onclick="toggleFullscreen()">
                    <i class="fa-solid fa-expand"></i> ملء الشاشة
                </button>
                <button class="btn btn-secondary" style="color: var(--danger-color);" onclick="stopConnection()">
                    <i class="fa-solid fa-power-off"></i> إنهاء الاتصال
                </button>
            </div>
        </div>
    </div>

    <script>
        // -----------------------------------------------------------------
        // 1. تهيئة Firebase Authentication
        // -----------------------------------------------------------------
        // ملاحظة: ضع مفاتيح مشروعك المجاني من Firebase Console هنا لتفعيل الخدمة
        const firebaseConfig = {
            apiKey: "AIzaSyDemoKey_ReplaceWithYourFirebaseKey",
            authDomain: "anyweb-app.firebaseapp.com",
            projectId: "anyweb-app",
            storageBucket: "anyweb-app.appspot.com",
            messagingSenderId: "1234567890",
            appId: "1:1234567890:web:abcdef123456"
        };

        // Initialize Firebase
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const auth = firebase.auth();
        const googleProvider = new firebase.auth.GoogleAuthProvider();

        let currentUser = null;
        let peer = null;
        let currentCall = null;
        let localStream = null;

        // مراقبة حالة تسجيل الدخول تلقائياً
        auth.onAuthStateChanged((user) => {
            if (user) {
                currentUser = user;
                showAppUI(user);
            } else {
                document.getElementById('authModal').style.display = 'flex';
                document.getElementById('userBadge').style.display = 'none';
            }
        });

        // -----------------------------------------------------------------
        // 2. وظائف التسجيل بجوجل وبالبريد
        // -----------------------------------------------------------------
        function loginWithGoogle() {
            auth.signInWithPopup(googleProvider)
                .catch((error) => {
                    alert("خطأ أثناء الاتصال بجوجل: " + error.message);
                });
        }

        function handleEmailSignUp() {
            const email = document.getElementById('loginEmail').value.trim();
            const pass = document.getElementById('loginPass').value.trim();

            if (!email || !pass) {
                alert('يرجى إدخال بريد Gmail وكلمة سر!');
                return;
            }

            auth.createUserWithEmailAndPassword(email, pass)
                .then(() => alert("تم إنشاء الحساب بنجاح!"))
                .catch((err) => alert("خطأ في إنشاء الحساب: " + err.message));
        }

        function handleEmailLogin() {
            const email = document.getElementById('loginEmail').value.trim();
            const pass = document.getElementById('loginPass').value.trim();

            if (!email || !pass) {
                alert('يرجى إدخال البريد وكلمة السر!');
                return;
            }

            auth.signInWithEmailAndPassword(email, pass)
                .catch((err) => alert("خطأ في تسجيل الدخول: " + err.message));
        }

        function showAppUI(user) {
            document.getElementById('authModal').style.display = 'none';
            document.getElementById('userBadge').style.display = 'flex';
            document.getElementById('userNameDisplay').innerText = user.displayName || user.email.split('@')[0];
            
            // الصورة الشخصية
            const avatarImg = document.getElementById('userAvatar');
            avatarImg.src = user.photoURL || `https://ui-avatars.com/api/?name=${user.email}&background=00f2fe&color=000`;

            initPeer(user.uid);
        }

        function logout() {
            auth.signOut().then(() => location.reload());
        }

        // -----------------------------------------------------------------
        // 3. ربط شاشات الجهاز (PeerJS)
        // -----------------------------------------------------------------
        function initPeer(userId) {
            const cleanId = userId.replace(/[^a-zA-Z0-9]/g, '').substring(0, 8);
            const peerId = 'desk-' + cleanId;
            
            peer = new Peer(peerId);

            peer.on('open', (id) => {
                document.getElementById('myIdInput').value = id;
                document.getElementById('hostInfo').style.display = 'block';
            });

            // استقبال الاتصال مع التأكد من كلمة السر
            peer.on('call', (call) => {
                const incomingPass = call.metadata ? call.metadata.password : null;
                const myPass = document.getElementById('hostPassword').value;

                if (incomingPass === myPass) {
                    if (localStream) {
                        call.answer(localStream);
                        currentCall = call;
                    }
                } else {
                    alert('⚠️ محاولة اتصال مرفوضة: كلمة السر غير صحيحة!');
                    call.close();
                }
            });
        }

        // بدء البث
        async function startScreenShare() {
            try {
                localStream = await navigator.mediaDevices.getDisplayMedia({ 
                    video: { cursor: "always" }, 
                    audio: false 
                });
                
                document.getElementById('remoteVideo').srcObject = localStream;
                document.getElementById('streamContainer').classList.add('active');

                // إنشاء QR Code للرابط المباشر
                const shareUrl = window.location.href.split('?')[0] + '?connect=' + peer.id;
                document.getElementById('qrcode-box').innerHTML = '';
                new QRCode(document.getElementById('qrcode-box'), { text: shareUrl, width: 110, height: 110 });

                document.getElementById('startShareBtn').style.display = 'none';

                localStream.getVideoTracks()[0].onended = () => stopConnection();

            } catch (err) {
                alert('لم يتم السماح بمشاركة الشاشة.');
            }
        }

        // الاتصال بجهاز آخر
        function connectToRemote() {
            const remoteId = document.getElementById('remoteIdInput').value.trim();
            const remotePass = document.getElementById('remotePassInput').value.trim();

            if (!remoteId || !remotePass) {
                alert('يرجى إدخال رمز الجهاز الآخر وكلمة السر الخاصين به!');
                return;
            }

            const call = peer.call(remoteId, null, {
                metadata: { password: remotePass }
            });
            currentCall = call;

            call.on('stream', (remoteStream) => {
                document.getElementById('remoteVideo').srcObject = remoteStream;
                document.getElementById('streamContainer').classList.add('active');
                document.getElementById('streamContainer').scrollIntoView({ behavior: 'smooth' });
            });

            call.on('close', () => {
                alert('تم إنهاء الاتصال.');
                stopConnection();
            });
        }

        function toggleFullscreen() {
            const container = document.getElementById('streamContainer');
            if (!document.fullscreenElement) {
                container.requestFullscreen().catch(err => alert(err.message));
            } else {
                document.exitFullscreen();
            }
        }

        function stopConnection() {
            if (localStream) {
                localStream.getTracks().forEach(track => track.stop());
                localStream = null;
            }
            if (currentCall) {
                currentCall.close();
                currentCall = null;
            }
            document.getElementById('streamContainer').classList.remove('active');
            document.getElementById('startShareBtn').style.display = 'flex';
        }
    </script>
</body>
</html>
